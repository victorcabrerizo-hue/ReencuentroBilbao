<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Reencuentro en Madrid · Cristina & Víctor</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Italiana&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0910;
  --rose:#c4526a;
  --gold:#d4a24a;
  --goldd:rgba(212,162,74,.38);
  --w:#f8f2ea;
  --wm:rgba(248,242,234,.58);
  --wl:rgba(248,242,234,.25);
}
body{
  background:var(--bg);color:var(--w);
  font-family:'Cormorant Garamond',Georgia,serif;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
  min-height:100svh;
}

/* HERO — full screen */
.hero{
  position:relative;
  min-height:100svh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;overflow:hidden;
  padding:max(2rem,env(safe-area-inset-top,2rem)) 2rem max(2rem,env(safe-area-inset-bottom,2rem));
}
.bg{position:absolute;inset:0;z-index:0}
.bg img{
  width:100%;height:100%;object-fit:cover;object-position:center 15%;display:block;
  filter:brightness(.22) contrast(1.08) sepia(.2);
}
.bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(
    170deg,
    rgba(20,16,40,.5) 0%,
    rgba(11,9,16,.4) 50%,
    rgba(11,9,16,.92) 100%
  );
}

.hero-inner{
  position:relative;z-index:1;
  width:100%;max-width:420px;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;gap:1.6rem;
}

/* TITLE BLOCK */
.title-block{display:flex;flex-direction:column;align-items:center;gap:.5rem}

.main-title{
  font-family:'Italiana',serif;
  font-size:clamp(2.6rem,11vw,5rem);
  font-weight:400;line-height:.95;
  letter-spacing:.01em;color:var(--w);
}
.sub-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(.9rem,3.8vw,1.2rem);
  font-weight:300;font-style:italic;
  color:var(--wm);letter-spacing:.08em;
}
.sub-title em{color:var(--rose);font-style:normal}

/* DIVIDER */
.divider{
  display:flex;align-items:center;gap:.8rem;width:100%;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--goldd)}
.divider span{font-size:.5rem;letter-spacing:.28em;text-transform:uppercase;color:var(--goldd);white-space:nowrap}

/* COUNTDOWN TO 28 MAY */
.cd-wrap{display:flex;flex-direction:column;align-items:center;gap:.6rem}
.cd-label{font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold)}
.cd{display:flex;justify-content:center;gap:clamp(.4rem,1.8vw,1rem)}
.cdu{display:flex;flex-direction:column;align-items:center;gap:.08rem}
.cdn{
  font-family:'Italiana',serif;
  font-size:clamp(2.8rem,12vw,5rem);
  line-height:1;color:var(--w);min-width:1.1ch;text-align:center;
}
.cdl{font-size:.5rem;letter-spacing:.16em;text-transform:uppercase;color:var(--goldd)}
.cdsep{
  font-family:'Italiana',serif;
  font-size:clamp(2rem,9vw,3.8rem);
  color:var(--rose);line-height:1;
  align-self:flex-start;padding-top:.1em;
}

/* SINCE / UNTIL block */
.dates-block{
  display:flex;flex-direction:column;align-items:center;gap:.9rem;
  width:100%;
}
.date-row{
  font-size:clamp(.82rem,3.3vw,.98rem);
  font-weight:300;color:var(--wm);line-height:1.55;
  font-style:italic;
}
.date-row strong{font-style:normal;font-weight:400;color:var(--w)}
.date-row em{font-style:normal;color:var(--rose)}

/* small days-since counter */
.since-pill{
  display:inline-flex;align-items:center;gap:.5rem;
  border:1px solid var(--goldd);border-radius:2rem;
  padding:.3rem 1rem;
  font-size:clamp(.72rem,3vw,.88rem);
  color:var(--wl);font-style:italic;font-weight:300;
}
.since-pill strong{font-style:normal;font-weight:400;color:var(--gold);font-size:1.1em}

/* FRASE FINAL */
.frase{
  font-size:clamp(.95rem,3.8vw,1.15rem);
  font-style:italic;font-weight:300;
  color:var(--wm);line-height:1.85;
  max-width:340px;
}
.frase strong{font-style:normal;font-weight:400;color:var(--w)}
</style>
</head>

const T=new Date('2026-05-28T00:00:00');
const D=new Date('2026-05-05T00:00:00');
function pad(n){return String(n).padStart(2,'0')}
function tick(){
  const now=new Date(),diff=T-now;
  const ds=Math.max(0,Math.floor((now-D)/864e5));
  document.getElementById('ds').textContent=ds;
  if(diff<=0){
    ['d','h','m','s'].forEach((id,i)=>document.getElementById(id).textContent=i?'':'¡HOY!');
    return;
  }
  document.getElementById('d').textContent=pad(Math.floor(diff/864e5));
  document.getElementById('h').textContent=pad(Math.floor(diff%864e5/36e5));
  document.getElementById('m').textContent=pad(Math.floor(diff%36e5/6e4));
  document.getElementById('s').textContent=pad(Math.floor(diff%6e4/1e3));
}
tick();setInterval(tick,1000);
